# Tiny Tapeout project information
project:
  title:        "Braun Multiplier Based Tiny TPU"
  author:       "Sam Ranjith"
  discord:      ""      
  description:  "A 2x2 systolic array matrix accelerator using Braun multipliers for TinyTapeout"
  language:     "Verilog"
  clock_hz:     10000000

  # Tile size
  tiles: "2x2"

  # Top module
  top_module:  "tt_um_braun_tpu"

  # RTL files
  source_files:
    - "tt_um_braun_tpu.v"
    - "memory.v"
    - "control_unit.v"
    - "mmu_feeder.v"
    - "systolic_array_2x2.v"
    - "pe_braun.v"
    - "braun_multiplier.v"
    - "delay_cell.v"

# Pinout
pinout:
  # Inputs
  ui[0]: "Matrix data bit 0"
  ui[1]: "Matrix data bit 1"
  ui[2]: "Matrix data bit 2"
  ui[3]: "Matrix data bit 3"
  ui[4]: "Matrix data bit 4"
  ui[5]: "Matrix data bit 5"
  ui[6]: "Matrix data bit 6"
  ui[7]: "Matrix data bit 7"

  # Outputs
  uo[0]: "Result bit 0"
  uo[1]: "Result bit 1"
  uo[2]: "Result bit 2"
  uo[3]: "Result bit 3"
  uo[4]: "Result bit 4"
  uo[5]: "Result bit 5"
  uo[6]: "Result bit 6"
  uo[7]: "Result bit 7"

  # Bidirectional
  uio[0]: "Multiplier data bit 0"
  uio[1]: "Multiplier data bit 1"
  uio[2]: "Multiplier data bit 2"
  uio[3]: "Multiplier data bit 3"
  uio[4]: "Multiplier data bit 4"
  uio[5]: "Multiplier data bit 5"
  uio[6]: "Multiplier data bit 6"
  uio[7]: "Multiplier data bit 7"

# Do not change
yaml_version: 6
